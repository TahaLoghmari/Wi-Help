services:
  api:
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_started
    build:
      context: ./backend
      target: development
    ports:
      - "5000:8080"
      - "5001:8081"
    env_file:
      - .env
    volumes:
      - ./backend:/app:cached
      - /app/backend.Host/bin
      - /app/backend.Host/obj
    stdin_open: true
    tty: true
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.web-api.rule=Host(`api.wi-help.com`)
      - traefik.http.routers.web-api.entrypoints=websecure
      - traefik.http.routers.web-api.tls.certresolver=letsencrypt
      - traefik.http.services.web-api.loadbalancer.server.port=8080

  db:
    image: postgres:16-alpine
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.seq.rule=Host(`seq.wi-help.com`)
      - traefik.http.routers.seq.entrypoints=websecure
      - traefik.http.routers.seq.tls.certresolver=letsencrypt
      - traefik.http.services.seq.loadbalancer.server.port=80

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
        - VITE_API_URL=https://api.wi-help.com
    depends_on:
      api:
        condition: service_started
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`wi-help.com`) || Host(`www.wi-help.com`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port=5173
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  db-data:
  seq-data:

networks:
  dokploy-network:
    external: true
